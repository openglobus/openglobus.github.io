<html>

<head>
    <title>OpenGlobus - Earth planet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../external/og/lib/og.css" type="text/css"/>
</head>

<body>
<div id="globus" style="width:100%;height:100%"></div>
<script type="module" id="og-sandbox-script">
    'use strict';

    import {
        Globe,
        LonLat,
        Bing,
        Vector,
        GlobusRgbTerrain
    } from "../../external/og/lib/og.es.js";

    const globe = new Globe({
        target: "globus",
        name: "Earth",
        terrain: new GlobusRgbTerrain(),
        layers: [new Bing()],
        resourcesSrc: "../../external/og/lib/res",
        fontsSrc: "../../external/og/lib/res/fonts"
    });

    const ell = globe.planet.ellipsoid;

    function getUpperOffset(index, length, minOffset = 750, maxOffset = 1000) {
        if (length <= 1) return minOffset;
        const t = index / (length - 1);
        const k = t <= 0.5 ? t / 0.5 : (1 - t) / 0.5; // 0 -> 1 -> 0
        return minOffset + (maxOffset - minOffset) * k;
    }

    function getCartesianPath(points) {
        const stripPath = [];
        const upperPath = [];

        for (let i = 0; i < points.length; i++) {
            const p = points[i];
            const baseHeight = 760;
            const upperHeight = getUpperOffset(i, points.length, 760, 1500);
            const p0 = ell.lonLatToCartesian(new LonLat(p[0], p[1], baseHeight));
            const p1 = ell.lonLatToCartesian(new LonLat(p[0], p[1], upperHeight));
            stripPath.push([p0, p1]);
            upperPath.push(p1);
        }

        return {stripPath, upperPath};
    }

    async function init() {
        const response = await fetch("./points.geojson");

        const geojson = await response.json();
        const stripPoints = geojson.features[0].geometry.coordinates.map((c) => [c[0], c[1]]);
        const cartesianData = getCartesianPath(stripPoints);

        const collection = new Vector("Collection", {
            entities: [
                {
                    strip: {
                        path: cartesianData.stripPath,
                        color: "rgba(0, 130, 255, 0.2)"
                    }
                },
                {
                    polyline: {
                        path3v: [cartesianData.upperPath],
                        thickness: 5.0,
                        color: "rgba(0, 220, 22, 1.0)"
                    }
                }
            ]
        });

        globe.planet.addLayer(collection);

        globe.planet.camera.setLonLat(
            new LonLat(-114.9685, 36.8665, 2150),
            new LonLat(-114.9605, 36.8722, 780)
        );
    }

    init().catch((err) => {
        console.error(err);
    });

</script>
</body>

</html>
