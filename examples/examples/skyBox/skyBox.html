<html>
<head>
    <title>SkyBox | OpenGlobus Example</title>
    <meta name="description" content="OpenGlobus example: SkyBox." />
    <meta name="keywords" content="SkyBox" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../external/og/lib/og.css" type="text/css" />
</head>
<body>
    <div id="globus" style="width:100%;height:100%"></div>
    <script type="module" id="og-sandbox-script">
'use strict';

import {
    Globe,
    GlobusRgbTerrain,
    Bing,
    scene
} from "../../external/og/lib/og.es.js";

var globus = new Globe({
    target: "globus",
    skybox: new scene.SkyBox({
        px: "./px.webp",
        nx: "./nx.webp",
        py: "./py.webp",
        ny: "./ny.webp",
        pz: "./pz.webp",
        nz: "./nz.webp"
    }),
    name: "Earth",
    terrain: new GlobusRgbTerrain(),
    layers: [new Bing()],
    sun: {
        active: true
    },
    resourcesSrc: "../../external/og/lib/res",
    fontsSrc: "../../external/og/lib/res/fonts"
});

</script>
</body>
</html>
